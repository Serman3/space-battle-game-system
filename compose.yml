version: '3.8'

services:

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    environment:
      OTLP_EXPORTER_ENDPOINT: http://tempo:4318
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://discovery-service:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  person-postgres:
    image: postgres:17
    container_name: person-postgres
    environment:
      POSTGRES_DB: person
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./infrastructure/databases/person:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 20

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://person-postgres:5432/person
      EUREKA_URI: http://discovery-service:8761/eureka
      POSTGRES_HOST: person-postgres
      POSTGRES_PORT: 5432
      OTLP_EXPORTER_ENDPOINT: http://tempo:4318
    ports:
      - "8092:8092"
    depends_on:
      discovery-service:
        condition: service_healthy
      person-postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://auth-servie:8092/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  game-service:
    build: ./game-service
    container_name: game-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://person-postgres:5432/person
      EUREKA_URI: http://discovery-service:8761/eureka
      POSTGRES_HOST: person-postgres
      POSTGRES_PORT: 5432
      OTLP_EXPORTER_ENDPOINT: http://tempo:4318
    ports:
      - "8093:8093"
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://game-service:8093/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api-gateway-service:
    build: ./api-gateway
    container_name: api-gateway-service
    environment:
      EUREKA_URI: http://discovery-service:8761/eureka
      OTLP_EXPORTER_ENDPOINT: http://tempo:4318
    ports:
      - "8086:8086"
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      game-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://api-gateway-service:8086/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Метрики для prometheus по БД person-postgres
  person-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: person-postgres-exporter
    depends_on:
      person-postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@person-postgres:5432/postgres?sslmode=disable
    ports:
      - "9188:9187"

  # Хранение метрик систем
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Хранение логов, которые будут отправляться в него агентом Alloy
  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:3100/ready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Используется нами для хранения трейсов наших сервисов. Данные в него отправляются нашим агентом Grafana Alloy
  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    volumes:
      - ./infrastructure/tempo/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    user: root
    ports:
      - "9080:9080" # HTTP interface
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP http
    volumes:
      - ./infrastructure/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/var/log:ro
    environment:
      GRAFANA_LOKI_URL: http://loki:3100/loki/api/v1/push
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:9080
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy

  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_started
      alloy:
        condition: service_started
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_METRICS_ENABLED: "true"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  artifacts:
  tempo_data:
  loki_data:
  loki_chunks:
  loki_index:
  loki_rules:

