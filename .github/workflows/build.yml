name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Run tests
        run: |
          mvn clean install -DskipTests
          docker compose up -d --wait
          sleep 240
          mvn clean test -pl game-service -am -P test