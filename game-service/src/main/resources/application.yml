server:
  port: 8093

jwt:
  access-token-key: '{"kty":"oct","k":"hi7S5RX5ZRZooHA0RKGctZ-KtR9FoESgCnH-3BNg5XI"}'
  refresh-token-key: '{"kty":"oct","k":"956PBFst1FguLr5irJD-aQ"}'

logging:
  level:
    sql: debug
    org.springframework.jdbc.core: trace
    org.springframework.security: trace

spring:
  profiles:
    active: prod
  application:
    name: game-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/game
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    user: postgres
    password: postgres
    enabled: true
    validate-on-migrate: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      org.hibernate:
        envers:
          autoRegisterListeners: true
          audit_table_suffix: _history
          default_schema: person_game_history
          store_data_at_delete: true
          revision_field_name: revision
          revision_type_field_name: revision_type
          revision_sequence_name: person_game_history.revinfo_seq
        hibernate:
          default_schema: person_game
          show_sql: ${SHOW_SQL:true}
          format_sql: ${FORMAT_SQL:true}
          highlight_sql: ${HIGHLIGHT_SQL:true}
          session.events.log.LOG_QUERIES_SLOWER_THAN_MS: ${SLOW_SQL_QUERY_INDICATOR_MS:1500}
          hbm2ddl:
            auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  kafka:
    bootstrap-servers: localhost:29092,localhost:39092,localhost:49092
    consumer:
      group-id: user_event_group
      auto-offset-reset: earliest

kafka:
  topics:
    users:
      events:
        topic:
          name: user_registered_event_topic

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: read_only
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0

otel:
  exporter:
    otlp:
      endpoint: ${OTLP_EXPORTER_ENDPOINT:http://localhost:4318}
      protocol: http/protobuf
  logs:
    exporter: none
  metrics:
    exporter: none
---
spring:
  config:
    activate:
      on-profile: test
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          AuthServiceClient:
            connect-timeout: 30000
            readTimeout: 30000
            logger-level: full
          GameServiceClient:
            connect-timeout: 30000
            readTimeout: 30000
            logger-level: full
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/game
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

resilience4j:
  timelimiter:
    configs:
      default:
        timeout-duration: 30000ms
        cancel-running-future: true

eureka:
  client:
    enabled: false

logging:
  config: "classpath:logback.xml"
  level:
    sql: debug
    org.springframework.jdbc.core: trace
    org.springframework.security: trace
    ru.otus.homework.api.client.AuthServiceClient: debug
    ru.otus.homework.api.client.GameServiceClient: debug

services:
  api-gateway-service:
    url: http://localhost:8086