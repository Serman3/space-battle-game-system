server:
  port: 8086

spring:
  application:
    name: api-gateway-service

logging:
  config: "classpath:logback.xml"

  cloud:
    gateway:
      routes:
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            - Path=/v1/auth/**
          filters:
            - AddRequestHeader=X-Gateway-Routing, auth-service

        - id: game-service-route
          uri: lb://game-service
          predicates:
            - Path=/v1/game/**
          filters:
            - AddRequestHeader=X-Gateway-Routing, game-service

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: read_only
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0

otel:
  exporter:
    otlp:
      endpoint: ${OTLP_EXPORTER_ENDPOINT:http://localhost:4318}
      protocol: http/protobuf
  logs:
    exporter: none
  metrics:
    exporter: none